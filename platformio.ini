; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = SmallOLED-PCMonitor
description = PC Stats Monitor with WiFi Portal - ESP32-C3 + SSD1306 OLED
; Plain `pio run` builds the HUB75 full firmware on the wired bench board
; (matrix-s3-wroom). The legacy OLED firmware still builds via explicit
; `-e esp32-c3-devkitm-1` / `-e oled-096` / `-e oled-13` / `-e oled-154` (used by
; create_firmware.py, release.py, merge_bins.py). Those envs are left fully defined.
default_envs = matrix-s3-wroom

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = direct
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
; Partition table: min_spiffs gives ~1.9MB per OTA slot (SPIFFS unused anyway).
; Required when BLE_SETUP_ENABLED = 1 to fit NimBLE (~200KB) alongside OTA.
board_build.partitions = min_spiffs.csv
lib_deps =
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit GFX Library@^1.12.4
	adafruit/Adafruit SSD1306@^2.5.15
	adafruit/Adafruit SH110x@^2.1.11
	bblanchon/ArduinoJson@^7.4.2
	ricmoo/QRCode@^0.0.1
	; BLE provisioning (NimBLE is ~200KB; dead-stripped by linker when BLE_SETUP_ENABLED = 0)
	h2zero/NimBLE-Arduino@^1.4.2
	; Improv-Serial WiFi push for the web flasher (tiny; stripped when IMPROV_SETUP_ENABLED = 0)
	jnthas/Improv WiFi Library@^0.0.2

; ---- Release build environments (display type fixed via build flag) ----
; These set DISPLAY_TYPE on the command line, which overrides DEFAULT_DISPLAY_TYPE
; in user_config.h (the source uses `#ifndef DISPLAY_TYPE`). This means you no
; longer edit user_config.h to switch OLED variants for a release build.
; They inherit all settings from the dev env above and only add the display flag.
[env:oled-096]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=0

[env:oled-13]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=1

; 1.54" CH1116 - SH1106-compatible controller with a 1-column display offset.
[env:oled-154]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=2

; ================= HUB75 RGB matrix (ESP32-S3) =================
; Full firmware on the RGB matrix. -DDISPLAY_HUB75=1 selects the matrix display
; shim (src/display/matrix_display.h) instead of the OLED drivers. Touch (GPIO7)
; and LED PWM (GPIO1) are forced off - their pins are HUB75 data lines.
;
; Shared base for the HUB75 full-firmware envs. Not built directly (no board).
[env:matrix-base]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
	-DDISPLAY_HUB75=1
	-DTOUCH_BUTTON_ENABLED=0
	-DLED_PWM_ENABLED=0
lib_deps =
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit GFX Library@^1.12.4
	bblanchon/ArduinoJson@^7.4.2
	ricmoo/QRCode@^0.0.1
	h2zero/NimBLE-Arduino@^1.4.2
	jnthas/Improv WiFi Library@^0.0.2
	; HUB75 driver, pinned to a real tag (3.0.14 = latest as of 2026-06-30).
	https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git#3.0.14

; Final target: Waveshare ESP32-S3-Zero (4MB, native USB-CDC, flash via BOOT-hold).
[env:matrix-s3]
extends = env:matrix-base
board = esp32-s3-devkitm-1
build_flags =
	${env:matrix-base.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
; S3-Zero is 4MB; the esp32-s3-devkitm-1 profile defaults to 8MB. Pin to 4MB.
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.flash_size = 4MB
board_build.partitions = min_spiffs.csv

; Bench board: ESP32-S3-WROOM-1 N16R8 (16MB flash). CH343 USB-UART bridge on COM9
; (auto-reset, no BOOT-hold), UART serial. Default `pio run` target.
[env:matrix-s3-wroom]
extends = env:matrix-base
board = esp32-s3-devkitc-1
; Board is on COM9 (CH343 bridge). Edit if the port changes.
upload_port = COM9
monitor_port = COM9
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

; ---- HUB75 hardware self-test (bring-up sketch only, not the firmware) ----
; Build ONLY repo-root bringup/. Filter relative to PROJECT_SRC_DIR (=src):
; -<*> drops src/, +<../bringup/> reaches up to repo-root/bringup.
[env:matrix-s3-bringup]
extends = env:matrix-s3
build_src_filter = -<*> +<../bringup/>

[env:matrix-wroom-bringup]
extends = env:matrix-s3-wroom
build_src_filter = -<*> +<../bringup/>
