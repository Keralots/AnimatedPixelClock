; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = AnimatedPixelClock
description = Animated pixel clock + PC stats monitor - ESP32-S3 + 128x64 HUB75 RGB matrix
default_envs = matrix-s3-wroom

; ================= HUB75 RGB matrix (ESP32-S3) =================
; Shared base for the full-firmware envs. Not built directly (no board).
[env:matrix-base]
platform = espressif32
framework = arduino
monitor_speed = 115200
; Custom-animation storage (uploaded .pca files) lives on LittleFS.
board_build.filesystem = littlefs
lib_deps =
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit GFX Library@^1.12.4
	bblanchon/ArduinoJson@^7.4.2
	ricmoo/QRCode@^0.0.1
	; Improv-Serial WiFi push for the web flasher (tiny; stripped when IMPROV_SETUP_ENABLED = 0)
	jnthas/Improv WiFi Library@^0.0.2
	; HUB75 driver, pinned to a real tag (3.0.14 = latest as of 2026-06-30).
	https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git#3.0.14

; Waveshare ESP32-S3-Zero (4MB, native USB-CDC, flash via BOOT-hold).
[env:matrix-s3]
extends = env:matrix-base
board = esp32-s3-devkitm-1
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
; S3-Zero is 4MB; the esp32-s3-devkitm-1 profile defaults to 8MB. Pin to 4MB.
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.flash_size = 4MB
board_build.partitions = min_spiffs.csv

; Main device: ESP32-S3-WROOM-1 N16R8 (16MB flash). CH343 USB-UART bridge on COM9
; (auto-reset, no BOOT-hold), UART serial. Default `pio run` target.
[env:matrix-s3-wroom]
extends = env:matrix-base
board = esp32-s3-devkitc-1
; Board is on COM9 (CH343 bridge). Edit if the port changes.
upload_port = COM9
monitor_port = COM9
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

; ---- HUB75 hardware self-test (bring-up sketch only, not the firmware) ----
; Build ONLY repo-root bringup/. Filter relative to PROJECT_SRC_DIR (=src):
; -<*> drops src/, +<../bringup/> reaches up to repo-root/bringup.
[env:matrix-s3-bringup]
extends = env:matrix-s3
build_src_filter = -<*> +<../bringup/>

[env:matrix-wroom-bringup]
extends = env:matrix-s3-wroom
build_src_filter = -<*> +<../bringup/>
