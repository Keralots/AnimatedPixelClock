; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = SmallOLED-PCMonitor
description = PC Stats Monitor with WiFi Portal - ESP32-C3 + SSD1306 OLED
; Plain `pio run` builds only the dev env below (fast, uses DEFAULT_DISPLAY_TYPE
; from user_config.h). Release builds for each OLED variant are produced
; explicitly via `-e oled-096` / `-e oled-13` (see create_firmware.py).
default_envs = esp32-c3-devkitm-1

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = direct
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
; Partition table: min_spiffs gives ~1.9MB per OTA slot (SPIFFS unused anyway).
; Required when BLE_SETUP_ENABLED = 1 to fit NimBLE (~200KB) alongside OTA.
board_build.partitions = min_spiffs.csv
lib_deps =
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit GFX Library@^1.12.4
	adafruit/Adafruit SSD1306@^2.5.15
	adafruit/Adafruit SH110x@^2.1.11
	bblanchon/ArduinoJson@^7.4.2
	ricmoo/QRCode@^0.0.1
	; BLE provisioning (NimBLE is ~200KB; dead-stripped by linker when BLE_SETUP_ENABLED = 0)
	h2zero/NimBLE-Arduino@^1.4.2
	; Improv-Serial WiFi push for the web flasher (tiny; stripped when IMPROV_SETUP_ENABLED = 0)
	jnthas/Improv WiFi Library@^0.0.2

; ---- Release build environments (display type fixed via build flag) ----
; These set DISPLAY_TYPE on the command line, which overrides DEFAULT_DISPLAY_TYPE
; in user_config.h (the source uses `#ifndef DISPLAY_TYPE`). This means you no
; longer edit user_config.h to switch OLED variants for a release build.
; They inherit all settings from the dev env above and only add the display flag.
[env:oled-096]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=0

[env:oled-13]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=1

; 1.54" CH1116 - SH1106-compatible controller with a 1-column display offset.
[env:oled-154]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DDISPLAY_TYPE=2
